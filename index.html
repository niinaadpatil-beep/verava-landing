<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verava \u2014 AI Voice Agent for Indian Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0b1120; --n2:#111827; --n3:#1a2540; --n4:#1e2d45; --n5:#263352;
  --teal:#0fb8a4; --t2:#14d1bb; --t3:#09e8d0;
  --tdim:rgba(15,184,164,0.12); --tglow:rgba(15,184,164,0.25); --tglow2:rgba(15,184,164,0.08);
  --border:rgba(255,255,255,0.07); --b2:rgba(255,255,255,0.12);
  --tx:#e8edf5; --tx2:#94a3b8; --tx3:#64748b;
  --green:#34d399; --gbg:rgba(52,211,153,0.1);
  --red:#f87171; --amber:#fbbf24; --indigo:#818cf8;
  --r:10px; --rl:16px;
}
html { scroll-behavior: smooth; }
body { font-family:'Figtree',sans-serif; background:var(--navy); color:var(--tx); -webkit-font-smoothing:antialiased; overflow-x:hidden; }
h1,h2,h3,h4 { font-family:'Syne',sans-serif; }
.mono { font-family:'JetBrains Mono',monospace; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-thumb { background:var(--n5); border-radius:3px; }

@keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes spin     { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes glow     { 0%,100%{box-shadow:0 0 20px var(--tglow)} 50%{box-shadow:0 0 40px rgba(15,184,164,0.45)} }
@keyframes float    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes orbMove  { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(60px,-40px) scale(1.1)} 66%{transform:translate(-40px,30px) scale(0.95)} }
@keyframes orbMove2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-50px,60px) scale(0.9)} 66%{transform:translate(70px,-30px) scale(1.05)} }
@keyframes waveIn   { from{transform:scaleX(0)} to{transform:scaleX(1)} }
@keyframes waveAnim { from{transform:scaleY(0.2)} to{transform:scaleY(1)} }
@keyframes tickerScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }

.fu{animation:fadeUp 0.5s ease both} .fu1{animation:fadeUp 0.5s 0.1s ease both} .fu2{animation:fadeUp 0.5s 0.2s ease both} .fu3{animation:fadeUp 0.5s 0.3s ease both} .fu4{animation:fadeUp 0.5s 0.4s ease both} .fu5{animation:fadeUp 0.5s 0.5s ease both}

.btn-p{background:linear-gradient(135deg,var(--teal),var(--t2));color:var(--navy);border:none;border-radius:var(--r);font-weight:700;font-family:'Figtree',sans-serif;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 8px 28px var(--tglow)}
.btn-g{background:transparent;border:1px solid var(--b2);color:var(--tx2);border-radius:var(--r);cursor:pointer;font-family:'Figtree',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.btn-g:hover{background:rgba(255,255,255,0.05);color:var(--tx);border-color:var(--teal)}
.card{background:var(--n3);border:1px solid var(--border);border-radius:var(--rl)}

.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15}
.orb1{width:600px;height:600px;background:radial-gradient(circle,var(--teal),transparent 70%);top:-200px;left:-200px;animation:orbMove 20s ease-in-out infinite}
.orb2{width:500px;height:500px;background:radial-gradient(circle,var(--indigo),transparent 70%);bottom:-150px;right:-150px;animation:orbMove2 25s ease-in-out infinite}
.orb3{width:300px;height:300px;background:radial-gradient(circle,var(--teal),transparent 70%);top:50%;right:10%;animation:orbMove 30s ease-in-out infinite reverse;opacity:0.08}
.grid-overlay{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(15,184,164,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(15,184,164,0.03) 1px,transparent 1px);background-size:60px 60px}

nav{position:sticky;top:0;z-index:1000;background:rgba(11,17,32,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--teal),var(--t2));border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px var(--tglow);animation:glow 3s ease-in-out infinite;flex-shrink:0}
.logo-icon span{color:var(--navy);font-weight:800;font-size:17px;font-family:'Syne',sans-serif}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--tx)}
.logo-sub{font-size:10px;color:var(--tx3);margin-top:1px}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none}
.nav-links a{color:var(--tx2);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s}
.nav-links a:hover{color:var(--tx)}
.nav-actions{display:flex;align-items:center;gap:10px}

.hero{position:relative;z-index:1;min-height:calc(100vh - 64px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 100px}
.hero-pill{display:inline-flex;align-items:center;gap:7px;background:var(--tdim);border:1px solid rgba(15,184,164,0.2);border-radius:40px;padding:5px 14px 5px 8px;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:28px}
.hero-pill-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(40px,7vw,76px);line-height:1.08;letter-spacing:-1.5px;color:var(--tx);max-width:900px;margin-bottom:22px}
.hero-title .accent{background:linear-gradient(135deg,var(--teal) 0%,var(--t3) 50%,var(--indigo) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:18px;font-weight:400;color:var(--tx2);max-width:580px;line-height:1.65;margin-bottom:40px}
.hero-sub strong{color:var(--tx);font-weight:600}
.hero-ctas{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:56px}
.hero-stats{display:flex;align-items:center;gap:36px;flex-wrap:wrap;justify-content:center}
.hero-stat{text-align:center}
.hero-stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:var(--tx);line-height:1}
.hero-stat-num .accent{color:var(--teal)}
.hero-stat-label{font-size:12px;color:var(--tx3);margin-top:4px}
.hero-stat-divider{width:1px;height:40px;background:var(--border)}

.hero-visual{position:relative;margin-top:60px;display:flex;justify-content:center}
.phone-mockup{width:260px;background:var(--n2);border:1px solid var(--b2);border-radius:28px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.6),0 0 60px var(--tglow2);animation:float 4s ease-in-out infinite;position:relative;z-index:2}
.phone-top{background:var(--n3);padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.phone-call-badge{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--green)}
.phone-call-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
.phone-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3)}
.phone-msgs{padding:14px 12px;display:flex;flex-direction:column;gap:8px}
.pmsg{max-width:85%;padding:8px 11px;border-radius:12px;font-size:11px;line-height:1.45}
.pmsg-vera{background:var(--tdim);border:1px solid rgba(15,184,164,0.15);color:var(--tx);align-self:flex-start;border-bottom-left-radius:3px}
.pmsg-vera .sender{font-size:9px;font-weight:700;color:var(--teal);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}
.pmsg-user{background:var(--n4);color:var(--tx2);align-self:flex-end;border-bottom-right-radius:3px}
.phone-input{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.phone-input-bar{flex:1;height:28px;background:var(--n4);border-radius:14px;border:1px solid var(--border)}
.phone-send{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--t2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.float-card{position:absolute;background:var(--n3);border:1px solid var(--b2);border-radius:12px;padding:10px 14px;font-size:11px;white-space:nowrap;box-shadow:0 12px 40px rgba(0,0,0,0.4);z-index:3}
.fc-left{left:-150px;top:50px;animation:float 5s 1s ease-in-out infinite}
.fc-right{right:-140px;top:100px;animation:float 5s 2s ease-in-out infinite}
.fc-bottom{bottom:40px;left:-100px;animation:float 5s 0.5s ease-in-out infinite}
.fc-label{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.fc-value{font-weight:700;color:var(--tx);font-size:12px}
.fc-green{color:var(--green)!important}
.fc-teal{color:var(--teal)!important}

section{position:relative;z-index:1}
.section-inner{max-width:1100px;margin:0 auto;padding:0 32px}
.section-label{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px}
.section-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,4vw,44px);color:var(--tx);line-height:1.15;letter-spacing:-0.5px;margin-bottom:14px}
.section-sub{font-size:16px;color:var(--tx2);line-height:1.65;max-width:560px}

.how-section{padding:100px 0;background:var(--n2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.steps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:2px;margin-top:56px;background:var(--border);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.step-card{background:var(--n2);padding:36px 28px;position:relative;transition:background .2s}
.step-card:hover{background:var(--n3)}
.step-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--tx3);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.step-num::after{content:'';flex:1;height:1px;background:var(--border)}
.step-icon{width:44px;height:44px;border-radius:12px;background:var(--tdim);border:1px solid rgba(15,184,164,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.step-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--tx);margin-bottom:8px}
.step-desc{font-size:13px;color:var(--tx2);line-height:1.6}

.industries-section{padding:100px 0}
.industries-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:56px}
.industry-card{background:var(--n3);border:1px solid var(--border);border-radius:var(--rl);padding:28px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.industry-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.industry-card:hover{border-color:rgba(15,184,164,0.25);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
.industry-card:hover::before{transform:scaleX(1)}
.ind-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:22px}
.ind-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--tx);margin-bottom:6px}
.ind-desc{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:16px}
.ind-metric-val{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--teal);line-height:1}
.ind-metric-lbl{font-size:10px;color:var(--tx3);margin-top:2px}

.outbound-section{padding:100px 0;background:var(--n2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.outbound-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:56px}
.outbound-card{background:var(--n3);border:1px solid var(--border);border-radius:var(--rl);padding:28px;transition:all .25s;position:relative;overflow:hidden}
.outbound-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),transparent);transform:scaleX(0);transform-origin:left;transition:transform .3s}
.outbound-card:hover{border-color:rgba(15,184,164,0.25);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
.outbound-card:hover::before{transform:scaleX(1)}
.outbound-card.featured-card{border-color:rgba(15,184,164,0.3);background:linear-gradient(160deg,rgba(15,184,164,0.08),var(--n3))}
.outbound-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:24px}
.outbound-tag{display:inline-flex;align-items:center;gap:5px;background:var(--tdim);border:1px solid rgba(15,184,164,0.2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.outbound-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--tx);margin-bottom:8px}
.outbound-desc{font-size:13px;color:var(--tx2);line-height:1.65;margin-bottom:16px}
.outbound-bullets{display:flex;flex-direction:column;gap:8px}
.outbound-bullet{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--tx2)}
.outbound-bullet::before{content:'\u2192';color:var(--teal);font-weight:700;flex-shrink:0;margin-top:1px}

.psych-banner{margin-top:40px;padding:28px 32px;background:linear-gradient(135deg,rgba(15,184,164,0.08),rgba(129,140,248,0.06));border:1px solid rgba(15,184,164,0.2);border-radius:20px;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center}
.psych-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--tx);margin-bottom:10px;line-height:1.2}
.psych-sub{font-size:14px;color:var(--tx2);line-height:1.65;margin-bottom:20px}
.psych-steps{display:flex;flex-direction:column;gap:10px}
.psych-step{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,0.04);border-radius:10px}
.psych-step-num{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--t2));color:var(--navy);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Syne',sans-serif}
.psych-step-text{font-size:12px;color:var(--tx2);line-height:1.5}
.psych-step-text strong{color:var(--tx)}

.features-section{padding:100px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.bento-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:56px}
.bento-card{background:var(--n3);border:1px solid var(--border);border-radius:var(--rl);padding:28px;transition:all .2s;overflow:hidden}
.bento-card:hover{border-color:rgba(15,184,164,0.2)}
.bento-wide{grid-column:span 2}
.bento-tall{grid-row:span 2}
.bento-icon{width:40px;height:40px;border-radius:11px;background:var(--tdim);border:1px solid rgba(15,184,164,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.bento-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--tx);margin-bottom:6px}
.bento-desc{font-size:13px;color:var(--tx2);line-height:1.6}
.mini-dash{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.mini-dash-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--n4);border-radius:8px;font-size:12px}
.mini-bar{height:4px;background:var(--n5);border-radius:2px;margin-top:12px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--teal),var(--t2));animation:waveIn 1.5s ease both;animation-delay:0.5s}
.waveform{display:flex;align-items:center;gap:3px;height:40px;margin-top:16px}
.wave-bar{width:4px;background:var(--teal);border-radius:2px;opacity:0.7;animation:waveAnim var(--dur) ease-in-out infinite alternate}

.contact-pricing-section{padding:100px 0;background:var(--n2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.contact-pricing-inner{max-width:800px;margin:0 auto;text-align:center;padding:0 32px}
.contact-pricing-card{background:linear-gradient(135deg,rgba(15,184,164,0.08),rgba(15,184,164,0.02));border:1px solid rgba(15,184,164,0.25);border-radius:24px;padding:56px 48px;position:relative;overflow:hidden}
.contact-pricing-card::before{content:'';position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(15,184,164,0.12) 0%,transparent 70%);pointer-events:none}
.cp-label{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:16px}
.cp-title{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(28px,4vw,42px);color:var(--tx);line-height:1.15;letter-spacing:-0.5px;margin-bottom:14px}
.cp-sub{font-size:16px;color:var(--tx2);line-height:1.65;margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto}
.cp-features{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:36px}
.cp-feature{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tx2)}
.cp-feature-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0}
.cp-ctas{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.cp-note{font-size:12px;color:var(--tx3);margin-top:16px}

/* CONTACT SECTION */
.contact-section{padding:100px 0}
.contact-card{background:var(--n3);border:1px solid var(--border);border-radius:var(--rl);padding:28px;display:flex;align-items:center;gap:18px;transition:all .25s;cursor:pointer;text-decoration:none;}
.contact-card:hover{border-color:rgba(15,184,164,0.3);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.3)}
.contact-icon{width:52px;height:52px;border-radius:14px;background:var(--tdim);border:1px solid rgba(15,184,164,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.contact-label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.contact-value{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:var(--tx);margin-bottom:2px}
.contact-hint{font-size:12px;color:var(--tx3)}

footer{position:relative;z-index:1;padding:60px 40px 32px;border-top:1px solid var(--border);background:var(--n2)}
.footer-inner{max-width:1100px;margin:0 auto}
.footer-top{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:40px;margin-bottom:48px}
.footer-brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--tx);margin-bottom:8px}
.footer-brand-desc{font-size:13px;color:var(--tx3);line-height:1.65;max-width:240px;margin-bottom:20px}
.footer-col-title{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.footer-links{display:flex;flex-direction:column;gap:9px;list-style:none}
.footer-links a{font-size:13px;color:var(--tx3);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--teal)}
.footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.footer-copy{font-size:12px;color:var(--tx3)}
.footer-made{font-size:12px;color:var(--tx3);display:flex;align-items:center;gap:5px}
.footer-made span{color:var(--teal)}

.ticker-section{padding:20px 0;background:var(--tdim);border-top:1px solid rgba(15,184,164,0.15);border-bottom:1px solid rgba(15,184,164,0.15);overflow:hidden;position:relative;z-index:1}
